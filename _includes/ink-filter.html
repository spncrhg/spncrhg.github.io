<!-- Inky "post-process" filters. Two SVG filters used from main.scss:
     #ink      – roughens edges (procedural noise -> displacement), like ink bleed.
     rendered off-screen; the <svg> itself draws nothing. -->
<svg class="ink-defs" width="0" height="0" aria-hidden="true" focusable="false">
  <defs>
    <filter id="ink" x="-10%" y="-10%" width="120%" height="120%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018"
                    numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Heavier displacement for the hover "wet ink" pool on links. -->
    <filter id="ink-strong" x="-15%" y="-15%" width="130%" height="130%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.03"
                    numOctaves="2" seed="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
